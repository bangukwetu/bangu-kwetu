backend:
  name: github
  repo: bangukwetu/bangu-kwetu
  branch: main
  base_url: https://sveltia-cms-auth.bangukwetu.workers.dev

media_folder: images
public_folder: /images

media_libraries:
  default:
    config:
      transformations:
        raster_image:
          format: webp
          quality: 82

collections:
  - name: articles
    label: Articles
    files:
      - name: articles
        label: All Articles
        file: data/articles.json
        fields:
          - label: Articles
            name: articles
            widget: list
            fields:
              - { label: ID, name: id, widget: string, hint: "Unique, e.g. news-004, no spaces" }
              - { label: Title, name: title, widget: string }
              - { label: Date, name: date, widget: string }
              - { label: Category, name: category, widget: select, options: [news, sports, business, nairobi] }
              - { label: Image, name: image, widget: image }
              - { label: Excerpt, name: desc, widget: text, required: false }
              - { label: Body, name: content, widget: markdown, required: false }
              - { label: Breaking News, name: breaking, widget: boolean, default: false }
              - { label: Featured, name: featured, widget: boolean, default: false }

  - name: shujaa
    label: Shujaa wa Siku
    files:
      - name: shujaa
        label: All Shujaa
        file: data/shujaa.json
        fields:
          - label: Shujaa
            name: shujaa
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Description, name: desc, widget: text }
              - { label: Full Story, name: story, widget: markdown, required: false }
              - { label: Photo, name: photo, widget: image, required: false }
              - { label: Link, name: link, widget: string, default: shujaa.html }